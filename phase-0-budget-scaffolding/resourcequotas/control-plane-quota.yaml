apiVersion: v1
kind: ResourceQuota
metadata:
  name: control-plane-quota
  namespace: control-plane
spec:
  hard:
    requests.memory: "2.8Gi"
    limits.memory: "4.2Gi"
    requests.cpu: "1.8"
    limits.cpu: "3.2"
    pods: "15"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: control-plane-defaults
  namespace: control-plane
spec:
  limits:
  - type: Container
    defaultRequest:
      memory: "256Mi"
      cpu: "100m"
    default:
      memory: "512Mi"
      cpu: "250m"
    max:
      memory: "1Gi"
      cpu: "1"
