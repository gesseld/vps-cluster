apiVersion: v1
kind: ResourceQuota
metadata:
  name: observability-plane-quota
  namespace: observability-plane
spec:
  hard:
    requests.memory: "1.5Gi"
    limits.memory: "2.9Gi"
    requests.cpu: "1.0"
    limits.cpu: "1.9"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: observability-plane-defaults
  namespace: observability-plane
spec:
  limits:
  - type: Container
    defaultRequest:
      memory: "128Mi"
      cpu: "50m"
    default:
      memory: "256Mi"
      cpu: "100m"
    max:
      memory: "512Mi"
      cpu: "500m"
