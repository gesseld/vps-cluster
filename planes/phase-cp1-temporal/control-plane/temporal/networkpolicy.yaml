apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporal-ingress
  namespace: control-plane
  labels:
    app: temporal
spec:
  podSelector:
    matchLabels:
      app: temporal
      component: server
  policyTypes:
  - Ingress
  ingress:
  # Allow from execution-plane namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: execution-plane
    ports:
    - protocol: TCP
      port: 7233
    - protocol: TCP
      port: 7234
    - protocol: TCP
      port: 7235
  
  # Allow internal communication
  - from:
    - podSelector:
        matchLabels:
          app: temporal
          component: server
    ports:
    - protocol: TCP
      port: 7236
    - protocol: TCP
      port: 7237
    - protocol: TCP
      port: 7238
  
  # Allow metrics scraping from observability-plane
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-plane
    ports:
    - protocol: TCP
      port: 9090
