# NATS JetStream Stream Configuration
# Defines streams with backpressure monitoring for DOCUMENTS, EXECUTION, and OBSERVABILITY

apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-stream-config
  namespace: default
  labels:
    app: nats
    component: stream-config
data:
  # Stream creation script
  create-streams.sh: |
    #!/bin/bash
    set -e
    
    echo "Creating NATS JetStream streams..."
    
    # Wait for NATS server to be ready
    echo "Waiting for NATS server to be ready..."
    until nats --server nats://nats:4222 server info 2>/dev/null; do
      echo "Waiting for NATS server..."
      sleep 2
    done
    
    # Create DOCUMENTS stream
    echo "Creating DOCUMENTS stream..."
    nats --server nats://nats:4222 stream add DOCUMENTS \
      --subjects "data.doc.>" \
      --retention workqueue \
      --max-msgs 100000 \
      --max-bytes 5GB \
      --storage file \
      --replicas 1 \
      --discard old \
      --dupe-window 2m \
      --max-msg-size 1MB \
      --max-age 0 \
      --max-msgs-per-subject -1 \
      --no-allow-rollup \
      --no-deny-delete \
      --no-deny-purge \
      --description "Document processing stream with work queue retention"
    
    # Create EXECUTION stream with proper limits
    echo "Creating EXECUTION stream..."
    nats --server nats://nats:4222 stream add EXECUTION \
      --subjects "exec.task.>" \
      --retention interest \
      --max-age 24h \
      --storage file \
      --replicas 1 \
      --discard old \
      --dupe-window 1m \
      --max-msg-size 512KB \
      --max-bytes 2GB \
      --max-msgs 50000 \
      --max-msgs-per-subject -1 \
      --no-allow-rollup \
      --no-deny-delete \
      --no-deny-purge \
      --description "Task execution stream with 24h retention, 2GB limit"
    
    # Create OBSERVABILITY stream
    echo "Creating OBSERVABILITY stream..."
    nats --server nats://nats:4222 stream add OBSERVABILITY \
      --subjects "obs.metric.>" \
      --retention limits \
      --max-bytes 1GB \
      --storage file \
      --replicas 1 \
      --discard old \
      --dupe-window 30s \
      --max-msg-size 128KB \
      --max-age 0 \
      --max-msgs-per-subject -1 \
      --no-allow-rollup \
      --no-deny-delete \
      --no-deny-purge \
      --description "Observability metrics stream with size limits"
    
    echo "All streams created successfully!"
    
    # Display stream information
    echo ""
    echo "Stream Information:"
    echo "==================="
    nats --server nats://nats:4222 stream info DOCUMENTS
    echo ""
    nats --server nats://nats:4222 stream info EXECUTION
    echo ""
    nats --server nats://nats:4222 stream info OBSERVABILITY
  
  # Backpressure monitoring script
  monitor-backpressure.sh: |
    #!/bin/bash
    set -e
    
    echo "Monitoring stream backpressure..."
    
    # Function to check stream backpressure
    check_stream_backpressure() {
      local stream_name=$1
      local threshold_percent=${2:-80}
      
      echo "Checking $stream_name stream backpressure..."
      
      # Get stream info
      stream_info=$(nats --server nats://nats:4222 stream info "$stream_name" --json 2>/dev/null || echo "{}")
      
      if [ "$stream_info" = "{}" ]; then
        echo "  ERROR: Could not retrieve stream info for $stream_name"
        return 1
      fi
      
      # Parse JSON to get metrics
      max_msgs=$(echo "$stream_info" | jq -r '.config.max_msgs // 0')
      max_bytes=$(echo "$stream_info" | jq -r '.config.max_bytes // 0')
      stored_msgs=$(echo "$stream_info" | jq -r '.state.messages // 0')
      stored_bytes=$(echo "$stream_info" | jq -r '.state.bytes // 0')
      
      # Calculate percentages
      if [ "$max_msgs" -gt 0 ]; then
        msg_percent=$((stored_msgs * 100 / max_msgs))
        echo "  Messages: $stored_msgs/$max_msgs ($msg_percent%)"
        
        if [ "$msg_percent" -gt "$threshold_percent" ]; then
          echo "  WARNING: Message backpressure > ${threshold_percent}%"
          return 2
        fi
      fi
      
      if [ "$max_bytes" -gt 0 ]; then
        bytes_percent=$((stored_bytes * 100 / max_bytes))
        echo "  Bytes: $(numfmt --to=iec $stored_bytes)/$(numfmt --to=iec $max_bytes) ($bytes_percent%)"
        
        if [ "$bytes_percent" -gt "$threshold_percent" ]; then
          echo "  WARNING: Storage backpressure > ${threshold_percent}%"
          return 2
        fi
      fi
      
      echo "  OK: Backpressure below ${threshold_percent}%"
      return 0
    }
    
    # Check each stream
    echo ""
    check_stream_backpressure "DOCUMENTS" 80
    documents_status=$?
    
    echo ""
    check_stream_backpressure "EXECUTION" 80
    execution_status=$?
    
    echo ""
    check_stream_backpressure "OBSERVABILITY" 80
    observability_status=$?
    
    echo ""
    echo "Backpressure monitoring completed."
    
    # Exit with worst status
    if [ $documents_status -eq 2 ] || [ $execution_status -eq 2 ] || [ $observability_status -eq 2 ]; then
      exit 2
    elif [ $documents_status -eq 1 ] || [ $execution_status -eq 1 ] || [ $observability_status -eq 1 ]; then
      exit 1
    else
      exit 0
    fi
  
  # Consumer creation script (optional)
  create-consumers.sh: |
    #!/bin/bash
    set -e
    
    echo "Creating sample consumers for streams..."
    
    # Wait for NATS server
    until nats --server nats://nats:4222 server info 2>/dev/null; do
      sleep 2
    done
    
    # Create consumer for DOCUMENTS stream
    echo "Creating consumer for DOCUMENTS stream..."
    nats --server nats://nats:4222 consumer add DOCUMENTS DOCUMENT_PROCESSOR \
      --pull \
      --filter "data.doc.process" \
      --ack-wait 30s \
      --max-deliver 5 \
      --sample 100 \
      --description "Document processing consumer"
    
    # Create consumer for EXECUTION stream
    echo "Creating consumer for EXECUTION stream..."
    nats --server nats://nats:4222 consumer add EXECUTION TASK_EXECUTOR \
      --pull \
      --filter "exec.task.run" \
      --ack-wait 60s \
      --max-deliver 3 \
      --sample 100 \
      --description "Task execution consumer"
    
    # Create consumer for OBSERVABILITY stream
    echo "Creating consumer for OBSERVABILITY stream..."
    nats --server nats://nats:4222 consumer add OBSERVABILITY METRICS_COLLECTOR \
      --pull \
      --filter "obs.metric.collect" \
      --ack-wait 10s \
      --max-deliver 1 \
      --sample 100 \
      --description "Metrics collection consumer"
    
    echo "All consumers created successfully!"
  
  # Stream definitions in JSON format for reference
  streams.json: |
    {
      "DOCUMENTS": {
        "subjects": ["data.doc.>"],
        "retention": "workqueue",
        "max_msgs": 100000,
        "max_bytes": 5368709120,
        "storage": "file",
        "replicas": 1,
        "discard": "old",
        "dupe_window": "2m",
        "max_msg_size": 1048576,
        "description": "Document processing stream with work queue retention"
      },
      "EXECUTION": {
        "subjects": ["exec.task.>"],
        "retention": "interest",
        "max_age": "24h",
        "max_bytes": 2147483648,
        "max_msgs": 50000,
        "storage": "file",
        "replicas": 1,
        "discard": "old",
        "dupe_window": "1m",
        "max_msg_size": 524288,
        "description": "Task execution stream with 24h retention, 2GB limit"
      },
      "OBSERVABILITY": {
        "subjects": ["obs.metric.>"],
        "retention": "limits",
        "max_bytes": 1073741824,
        "storage": "file",
        "replicas": 1,
        "discard": "old",
        "dupe_window": "30s",
        "max_msg_size": 131072,
        "description": "Observability metrics stream with size limits"
      }
    }