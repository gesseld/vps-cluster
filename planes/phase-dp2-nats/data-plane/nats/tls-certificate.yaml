# NATS TLS Certificate using cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nats-tls
  namespace: data-plane
spec:
  # Secret name where the certificate will be stored
  secretName: nats-tls
  
  # Common Name (CN) for the certificate
  commonName: nats.data-plane.svc.cluster.local
  
  # DNS names for the certificate
  dnsNames:
    - nats.data-plane.svc.cluster.local
    - nats
    - nats.data-plane
    - localhost
  
  # IP addresses (optional)
  ipAddresses:
    - 127.0.0.1
  
  # Certificate validity duration
  duration: 8760h  # 1 year
  renewBefore: 720h # 30 days before expiration
  
  # Private key configuration
  privateKey:
    algorithm: RSA
    size: 4096
    rotationPolicy: Always
  
  # Issuer reference
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# Certificate for NATS client connections (optional)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nats-client-tls
  namespace: data-plane
spec:
  secretName: nats-client-tls
  commonName: nats-client.data-plane.svc.cluster.local
  dnsNames:
    - nats-client.data-plane.svc.cluster.local
    - "*.data-plane.svc.cluster.local"
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# CA Bundle for clients (optional)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-ca-bundle
  namespace: data-plane
  labels:
    app: nats
    component: tls
