apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-stream-init-script
  namespace: data-plane
data:
  init-streams.sh: |
    #!/bin/sh
    set -e
    
    echo "Waiting for NATS server to be ready..."
    until nc -z nats 4222; do
      sleep 2
    done
    
    echo "Creating streams using NATS server API..."
    
    # Create DOCUMENTS stream
    cat << EOF > /tmp/create-documents.json
    {
      "name": "DOCUMENTS",
      "subjects": ["data.doc.>"],
      "retention": "workqueue",
      "max_msgs": 100000,
      "max_bytes": 5368709120,
      "storage": "file",
      "num_replicas": 1,
      "discard": "old",
      "duplicate_window": 120000000000,
      "max_msg_size": 1048576,
      "max_age": 0,
      "max_msgs_per_subject": -1,
      "allow_rollup": false,
      "deny_delete": false,
      "deny_purge": false,
      "description": "Document processing stream with work queue retention"
    }
    EOF
    
    # Create EXECUTION stream
    cat << EOF > /tmp/create-execution.json
    {
      "name": "EXECUTION",
      "subjects": ["exec.task.>"],
      "retention": "interest",
      "max_age": 86400000000000,
      "storage": "file",
      "num_replicas": 1,
      "discard": "old",
      "duplicate_window": 60000000000,
      "max_msg_size": 524288,
      "max_bytes": 2147483648,
      "max_msgs": 50000,
      "max_msgs_per_subject": -1,
      "allow_rollup": false,
      "deny_delete": false,
      "deny_purge": false,
      "description": "Task execution stream with 24h retention, 2GB limit"
    }
    EOF
    
    # Create OBSERVABILITY stream
    cat << EOF > /tmp/create-observability.json
    {
      "name": "OBSERVABILITY",
      "subjects": ["obs.metric.>"],
      "retention": "limits",
      "max_bytes": 1073741824,
      "storage": "file",
      "num_replicas": 1,
      "discard": "old",
      "duplicate_window": 30000000000,
      "max_msg_size": 131072,
      "max_age": 0,
      "max_msgs_per_subject": -1,
      "allow_rollup": false,
      "deny_delete": false,
      "deny_purge": false,
      "description": "Observability metrics stream with size limits"
    }
    EOF
    
    # Function to create stream
    create_stream() {
      local stream_name=$1
      local config_file=$2
      
      echo "Creating $stream_name stream..."
      
      # Check if stream already exists
      if curl -s "http://localhost:8222/jsz?stream=$stream_name" | grep -q "\"name\":\"$stream_name\""; then
        echo "Stream $stream_name already exists"
        return 0
      fi
      
      # Create stream
      if curl -s -X POST "http://localhost:8222/jsz?stream=$stream_name" \
        -H "Content-Type: application/json" \
        -d "@$config_file" | grep -q "\"success\":true"; then
        echo "Stream $stream_name created successfully"
      else
        echo "Failed to create stream $stream_name"
        return 1
      fi
    }
    
    # Create all streams
    create_stream "DOCUMENTS" "/tmp/create-documents.json"
    create_stream "EXECUTION" "/tmp/create-execution.json"
    create_stream "OBSERVABILITY" "/tmp/create-observability.json"
    
    echo "All streams created successfully!"
    
    # Display stream info
    echo ""
    echo "Stream Information:"
    echo "==================="
    curl -s "http://localhost:8222/jsz?stream=DOCUMENTS" | jq -r '.streams[0] | "DOCUMENTS: \(.state.messages) messages, \(.state.bytes) bytes"'
    curl -s "http://localhost:8222/jsz?stream=EXECUTION" | jq -r '.streams[0] | "EXECUTION: \(.state.messages) messages, \(.state.bytes) bytes"'
    curl -s "http://localhost:8222/jsz?stream=OBSERVABILITY" | jq -r '.streams[0] | "OBSERVABILITY: \(.state.messages) messages, \(.state.bytes) bytes"'
    
    echo ""
    echo "Stream initialization completed!"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: nats-init-streams
  namespace: data-plane
spec:
  template:
    spec:
      containers:
      - name: init-streams
        image: curlimages/curl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          cp /scripts/init-streams.sh /tmp/init.sh
          chmod +x /tmp/init.sh
          /tmp/init.sh
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        env:
        - name: NATS_URL
          value: "nats://nats:4222"
      volumes:
      - name: scripts
        configMap:
          name: nats-stream-init-script
      restartPolicy: Never
  backoffLimit: 3