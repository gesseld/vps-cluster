apiVersion: v1
kind: Pod
metadata:
  name: nats-stream-creator
  namespace: data-plane
  labels:
    app: nats
    component: stream-creator
spec:
  containers:
  - name: stream-creator
    image: natsio/nats-box:latest
    command: ["sleep", "3600"]
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  restartPolicy: Never