apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: data-plane
  labels:
    app.kubernetes.io/component: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: nats
    app.kubernetes.io/version: 2.12.6
    helm.sh/chart: nats-2.12.6
data:
  nats.conf: |
    # JetStream configuration
    jetstream {
      store_dir: "/data/jetstream"
      max_memory_store: 268435456  # 256Mi
      max_file_store: 15032385536  # 14Gi
    }
    
    # Stream definitions (must be at top level, not inside jetstream)
    stream DOCUMENTS {
      subjects = ["data.doc.>"]
      retention = workq
      max_msgs = 100000
      max_bytes = 5GB
      storage = file
      num_replicas = 1
      discard = old
      duplicate_window = 2m
      max_msg_size = 1MB
      description = "Document processing stream with work queue retention"
    }
    
    stream EXECUTION {
      subjects = ["exec.task.>"]
      retention = interest
      max_age = 24h
      max_msgs = 50000
      max_bytes = 2GB
      storage = file
      num_replicas = 1
      discard = old
      duplicate_window = 1m
      max_msg_size = 512KB
      description = "Task execution stream with 24h retention, 2GB limit"
    }
    
    stream OBSERVABILITY {
      subjects = ["obs.metric.>"]
      retention = limits
      max_bytes = 1GB
      storage = file
      num_replicas = 1
      discard = old
      duplicate_window = 30s
      max_msg_size = 128KB
      description = "Observability metrics stream with size limits"
    }
    
    # Server name
    server_name: $SERVER_NAME
    
    # HTTP monitoring
    http_port: 8222
    
    # Client port
    port: 4222
    
    # PID file
    pid_file: "/var/run/nats/nats.pid"
    
    # Lame duck mode
    lame_duck_duration: "30s"
    lame_duck_grace_period: "10s"