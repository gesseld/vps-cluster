# NATS JetStream production configuration for data plane
# Optimized for k3s resource constraints

global:
  jetstream:
    enabled: true
    fileStorage:
      enabled: true
      storageDirectory: /data/jetstream
      storageSize: 15Gi
      storageClassName: hcloud-volumes
      volumeBindingMode: WaitForFirstConsumer

nats:
  # Image configuration
  image:
    repository: nats
    tag: 2.12.6-alpine
    pullPolicy: IfNotPresent
  
  # Single replica for data plane (can scale later)
  replicaCount: 1
  
  # Resource constraints for k3s cluster
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  
  # JetStream configuration
  jetstream:
    enabled: true
    memStorage: 256M
    fileStorage: 14G
    domain: ""
  
  # TLS configuration
  tls:
    enabled: true
    secret:
      name: nats-tls
  
  # Client configuration
  client:
    enabled: true
    port: 4222
    tls:
      enabled: true
      secret:
        name: nats-tls
  
  # Cluster disabled for single node
  cluster:
    enabled: false
  
  # Monitoring
  monitor:
    enabled: true
    port: 8222
  
  # Security
  securityContext:
    enabled: true
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
  
  # Health checks
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Server configuration with JetStream streams pre-defined
config:
  # Main server configuration
  serverConfig: |
    # JetStream configuration
    jetstream {
      store_dir: "/data/jetstream"
      max_memory_store: 268435456  # 256Mi
      max_file_store: 15032385536  # 14Gi
    }
    
    # HTTP monitoring
    http: 8222
    
    # TLS configuration
    tls {
      cert_file: "/etc/nats/tls/tls.crt"
      key_file: "/etc/nats/tls/tls.key"
      ca_file: "/etc/nats/tls/ca.crt"
    }
    
    # JetStream streams configuration
    stream {
      name: "DOCUMENTS"
      subjects: ["data.doc.>"]
      retention: workqueue
      max_msgs: 100000
      max_bytes: 5368709120  # 5GB
      storage: file
      num_replicas: 1
      discard: old
      duplicate_window: 120s
      max_msg_size: 1048576  # 1MB
      max_age: 0
      max_msgs_per_subject: -1
      allow_rollup: false
      deny_delete: false
      deny_purge: false
      description: "Document processing stream with work queue retention"
    }
    
    stream {
      name: "EXECUTION"
      subjects: ["exec.task.>"]
      retention: interest
      max_age: 24h
      storage: file
      num_replicas: 1
      discard: old
      duplicate_window: 60s
      max_msg_size: 524288  # 512KB
      max_bytes: 2147483648  # 2GB
      max_msgs: 50000
      max_msgs_per_subject: -1
      allow_rollup: false
      deny_delete: false
      deny_purge: false
      description: "Task execution stream with 24h retention, 2GB limit"
    }
    
    stream {
      name: "OBSERVABILITY"
      subjects: ["obs.metric.>"]
      retention: limits
      max_bytes: 1073741824  # 1GB
      storage: file
      num_replicas: 1
      discard: old
      duplicate_window: 30s
      max_msg_size: 131072  # 128KB
      max_age: 0
      max_msgs_per_subject: -1
      allow_rollup: false
      deny_delete: false
      deny_purge: false
      description: "Observability metrics stream with size limits"
    }

# Disable optional components to save resources
natsbox:
  enabled: false

exporter:
  enabled: false

reloader:
  enabled: false

accountserver:
  enabled: false

# Service configuration - using Helm chart defaults
# The chart automatically configures ports based on enabled protocols