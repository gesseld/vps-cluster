apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-allow-job-pods
  namespace: data-plane
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          job-name: nats-create-streams
    ports:
    - protocol: TCP
      port: 4222
    - protocol: TCP
      port: 8222