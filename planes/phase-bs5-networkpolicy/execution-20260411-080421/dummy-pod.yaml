apiVersion: v1
kind: Pod
metadata:
  name: test-pod-networkpolicy
  namespace: networkpolicy-test
  labels:
    app: test-pod
    purpose: networkpolicy-test
    managed-by: bs5-networkpolicy
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  restartPolicy: Always
