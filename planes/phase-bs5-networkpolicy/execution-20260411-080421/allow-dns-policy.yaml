apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: networkpolicy-test
  labels:
    policy-type: dns-allowance
    managed-by: bs5-networkpolicy
spec:
  podSelector:
    matchLabels:
      app: test-pod
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: core-dns
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
