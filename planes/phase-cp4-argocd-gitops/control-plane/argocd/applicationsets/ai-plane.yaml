apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-plane-appset
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        revision: main
        directories:
          - path: ai/*
    
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      labels:
        plane: ai
        app.kubernetes.io/part-of: ai-plane
        argocd.argoproj.io/instance: ai-plane
    
    spec:
      project: default
      
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: main
        path: '{{path}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - ServerSideApply=true  # Use server-side apply for AI components
        
        retry:
          limit: 4
          backoff:
            duration: 15s  # Longer backoff for AI components
            factor: 2
            maxDuration: 180s