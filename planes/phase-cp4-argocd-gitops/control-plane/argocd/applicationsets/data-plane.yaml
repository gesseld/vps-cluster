apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: data-plane-appset
  namespace: dip-control-infra
spec:
  generators:
    - git:
        repoURL: https://github.com/gesseld/vps-cluster.git
        revision: master
        directories:
          - path: planes/phase-dp*
    
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: dip-control-infra
      labels:
        plane: data
    
    spec:
      project: default
      
      source:
        repoURL: https://github.com/gesseld/vps-cluster.git
        targetRevision: master
        path: '{{path}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      syncPolicy:
        # manual initially for stateful workloads
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
        
        retry:
          limit: 5  # Higher retry for data plane components
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 120s