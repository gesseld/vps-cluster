apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: data-plane-appset
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        revision: main
        directories:
          - path: data-plane/*
    
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      labels:
        plane: data
        app.kubernetes.io/part-of: data-plane
        argocd.argoproj.io/instance: data-plane
    
    spec:
      project: default
      
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: main
        path: '{{path}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
        
        retry:
          limit: 5  # Higher retry for data plane components
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 120s