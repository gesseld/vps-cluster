apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: control-plane-appset
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        revision: main
        directories:
          - path: control-plane/*
    
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      labels:
        plane: control
        app.kubernetes.io/part-of: control-plane
        argocd.argoproj.io/instance: control-plane
    
    spec:
      project: default
      
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: main
        path: '{{path}}'
        
        # Enable helm if needed
        # helm:
        #   valueFiles:
        #     - values.yaml
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
        
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 60s