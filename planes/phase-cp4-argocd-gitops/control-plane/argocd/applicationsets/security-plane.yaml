apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: security-plane-appset
  namespace: dip-control-infra
spec:
  generators:
    - git:
        repoURL: https://github.com/gesseld/vps-cluster.git
        revision: master
        directories:
          - path: planes/phase-cp2-kyverno
          - path: planes/phase-ory-zero-trust-deploy
          - path: planes/phase-sf*
    
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: dip-control-infra
      labels:
        plane: security
    
    spec:
      project: default
      
      ignoreDifferences:
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
            - /stringData
      
      source:
        repoURL: https://github.com/gesseld/vps-cluster.git
        targetRevision: master
        path: '{{path}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - Validate=true  # Extra validation for security components
          - IgnoreExtraneous=true
        
        retry:
          limit: 2  # Lower retry for security (fail fast)
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 30s