apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: observability-plane-appset
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        revision: main
        directories:
          - path: observability/*
    
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
      labels:
        plane: observability
        app.kubernetes.io/part-of: observability-plane
        argocd.argoproj.io/instance: observability-plane
    
    spec:
      project: default
      
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: main
        path: '{{path}}'
      
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - RespectIgnoreDifferences=true
          - PrunePropagationPolicy=foreground  # Careful pruning for observability
        
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 60s