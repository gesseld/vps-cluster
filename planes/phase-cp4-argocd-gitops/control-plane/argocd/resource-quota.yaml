apiVersion: v1
kind: ResourceQuota
metadata:
  name: argocd-resource-quota
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/component: resource-management
spec:
  hard:
    # Memory limits (512MB total for ArgoCD namespace)
    limits.memory: 512Mi
    requests.memory: 256Mi
    
    # CPU limits
    limits.cpu: "1000m"
    requests.cpu: "500m"
    
    # Pod limits (single replica + sidecars)
    pods: "5"
    
    # Persistent volume claims (for Redis if needed)
    persistentvolumeclaims: "1"
    requests.storage: "1Gi"
    
    # ConfigMap and Secret limits
    configmaps: "10"
    secrets: "10"
    
    # Service limits (ArgoCD needs more services)
    services: "10"
    
    # Standard resource limits (compatible with K3s)
    # Note: K3s may not support all extended resource quotas