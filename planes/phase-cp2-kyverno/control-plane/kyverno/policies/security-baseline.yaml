apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-privileged-exec
  annotations:
    policies.kyverno.io/title: Block Privileged Containers in Execution/AI Planes
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: PodSecurity
    policies.kyverno.io/description: >-
      Denies privileged containers in execution and ai planes.
      Execution and AI workloads should run with minimal privileges.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: block-privileged-execution-ai
    match:
      resources:
        kinds:
        - Pod
    preconditions:
      any:
      - key: "{{ request.object.metadata.labels.plane }}"
        operator: Equals
        value: execution
      - key: "{{ request.object.metadata.labels.plane }}"
        operator: Equals
        value: ai
    validate:
      message: "Privileged containers are not allowed in execution or ai planes"
      pattern:
        spec:
          containers:
          - name: "*"
            =(securityContext):
              =(privileged): false
    exclude:
      resources:
        namespaces:
        - kube-system
        - kyverno
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-readonly-root-fs
  annotations:
    policies.kyverno.io/title: Enforce Read-Only Root Filesystem
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: PodSecurity
    policies.kyverno.io/description: >-
      Enforces immutable container filesystems with read-only root filesystem.
      Prevents persistence of malicious files and reduces attack surface.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: enforce-readonly-root-fs
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "All containers must have readOnlyRootFilesystem: true"
      pattern:
        spec:
          containers:
          - name: "*"
            securityContext:
              readOnlyRootFilesystem: true
    exclude:
      resources:
        namespaces:
        - kube-system
        - kyverno
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-host-path
  annotations:
    policies.kyverno.io/title: Block Host Path Volumes
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: PodSecurity
    policies.kyverno.io/description: >-
      Blocks hostPath volumes to prevent host filesystem access.
      Critical for multi-tenant environments.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: block-host-path
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "hostPath volumes are not allowed"
      pattern:
        spec:
          =(volumes):
          - X(hostPath): "null"
    exclude:
      resources:
        namespaces:
        - kube-system
        - kyverno
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-user
  annotations:
    policies.kyverno.io/title: Require Non-Root User
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: PodSecurity
    policies.kyverno.io/description: >-
      Requires containers to run as non-root users.
      Reduces privilege escalation risks.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-non-root-user
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "Containers must run as non-root users"
      pattern:
        spec:
          containers:
          - name: "*"
            securityContext:
              =(runAsNonRoot): true
    exclude:
      resources:
        namespaces:
        - kube-system
        - kyverno