apiVersion: v1
kind: Service
metadata:
  name: kyverno-svc
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/component: metrics
spec:
  ports:
  - name: metrics
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: webhook
    port: 9443
    targetPort: 9443
    protocol: TCP
  selector:
    app.kubernetes.io/name: kyverno
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kyverno-metrics
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kyverno
  namespaceSelector:
    matchNames:
    - kyverno
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    honorLabels: true
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kyverno-metrics-config
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
data:
  prometheus-scrape.yaml: |
    global:
      scrape_interval: 30s
      scrape_timeout: 10s
      evaluation_interval: 30s
    
    scrape_configs:
    - job_name: 'kyverno'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - kyverno
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: kyverno
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: "8000"
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: ${1}:8000
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - target_label: job
        replacement: kyverno
    
    - job_name: 'kyverno-policy-violations'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - kyverno
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: keep
        regex: kyverno
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: "8000"
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: ${1}:8000
      metrics_path: /policyviolations
      params:
        format: [prometheus]
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - target_label: job
        replacement: kyverno-policy-violations
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kyverno-metrics
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-metrics-reader
  labels:
    app.kubernetes.io/name: kyverno
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-metrics-reader
  labels:
    app.kubernetes.io/name: kyverno
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-metrics-reader
subjects:
- kind: ServiceAccount
  name: kyverno-metrics
  namespace: kyverno
---
apiVersion: v1
kind: Pod
metadata:
  name: kyverno-metrics-exporter
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno
    app.kubernetes.io/component: metrics-exporter
spec:
  serviceAccountName: kyverno-metrics
  containers:
  - name: metrics-exporter
    image: nginx:alpine
    ports:
    - containerPort: 9113
      name: metrics
    volumeMounts:
    - name: config
      mountPath: /etc/nginx
    args:
    - -c
    - /etc/nginx/nginx.conf
  volumes:
  - name: config
    configMap:
      name: kyverno-metrics-config
      items:
      - key: nginx.conf
        path: nginx.conf
  # This pod is optional - only needed if you want to expose metrics
  # through a separate exporter. Kyverno already exposes metrics on port 8000.