# Foundation RBAC Roles for SF-2 task
# Minimal least-privilege roles for service accounts
# Excludes kube-system and kyverno namespaces from policies

---
# Temporal Server Role - workflow orchestration
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: temporal-server-role
  namespace: control-plane
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: temporal-server-binding
  namespace: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: temporal-server-role
subjects:
- kind: ServiceAccount
  name: temporal-server
  namespace: control-plane
---
# Kyverno Role - policy management (cluster-wide but restricted)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-foundation-role
  labels:
    rbac-tier: foundation
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["kyverno.io"]
  resources: ["clusterpolicies", "policies"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-foundation-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-foundation-role
subjects:
- kind: ServiceAccount
  name: kyverno
  namespace: control-plane
---
# Spire Server Role - identity management
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-server-role
  namespace: control-plane
rules:
- apiGroups: [""]
  resources: ["pods", "serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update"]
- apiGroups: ["spire.spiffe.io"]
  resources: ["spiffeids"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-server-binding
  namespace: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-server-role
subjects:
- kind: ServiceAccount
  name: spire-server
  namespace: control-plane
---
