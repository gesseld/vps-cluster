# Control Plane to Data Plane Allow Rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-control-to-data
  namespace: control-plane
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # To PostgreSQL
  - ports:
    - port: 5432
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: data-plane
      podSelector:
        matchLabels:
          app: postgres
  # To Redis
  - ports:
    - port: 6379
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: data-plane
      podSelector:
        matchLabels:
          app: redis
