apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal
  namespace: control-plane
  labels:
    app: temporal
    component: server
    plane: control
    tenant: platform
spec:
  serviceName: temporal-headless
  replicas: 2
  selector:
    matchLabels:
      app: temporal
      component: server
  template:
    metadata:
      labels:
        app: temporal
        component: server
        plane: control
        tenant: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: temporal-server
      priorityClassName: foundation-critical
      terminationGracePeriodSeconds: 30

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: temporal
                component: server
            topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: temporal
            component: server

      containers:
      - name: temporal
        image: temporalio/server:1.25.0
        imagePullPolicy: IfNotPresent

        resources:
          requests:
            memory: "750Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        ports:
        - name: frontend
          containerPort: 7233
          protocol: TCP
        - name: history
          containerPort: 7234
          protocol: TCP
        - name: matching
          containerPort: 7235
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        - name: int-frontend
          containerPort: 7236
          protocol: TCP
        - name: int-history
          containerPort: 7237
          protocol: TCP
        - name: int-matching
          containerPort: 7238
          protocol: TCP

        env:
        - name: SERVICES
          value: "frontend,history,matching"
        - name: SKIP_DEFAULT_NAMESPACE_CREATION
          value: "true"
        - name: TEMPORAL_CONFIG_PATH
          value: "/etc/temporal/config/development.yaml"
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: "/etc/temporal/config/dynamicconfig.yaml"
        - name: LOG_LEVEL
          value: "info"
        - name: POSTGRES_SEEDS
          value: "postgresql-primary.data-plane.svc.cluster.local"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-postgres-creds
              key: username
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              name: temporal-postgres-creds
              key: password

        volumeMounts:
        - name: config
          mountPath: /etc/temporal/config
          readOnly: true
        - name: data
          mountPath: /var/lib/temporal
        - name: tmp
          mountPath: /tmp

        livenessProbe:
          tcpSocket:
            port: 7233
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          tcpSocket:
            port: 7233
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1

        startupProbe:
          exec:
            command:
            - sh
            - -c
            - "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/postgresql-primary.data-plane.svc.cluster.local/5432' || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30

        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

      volumes:
      - name: config
        configMap:
          name: temporal-config
      - name: data
        emptyDir: {}
      - name: tmp
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: temporal-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: hcloud-volumes
      resources:
        requests:
          storage: 10Gi
