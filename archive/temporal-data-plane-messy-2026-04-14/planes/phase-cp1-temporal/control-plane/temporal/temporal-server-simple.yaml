apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal
  namespace: control-plane
  labels:
    app: temporal
    component: server
    plane: control
spec:
  serviceName: temporal-headless
  replicas: 2
  selector:
    matchLabels:
      app: temporal
      component: server
  template:
    metadata:
      labels:
        app: temporal
        component: server
        plane: control
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: temporal-server
      priorityClassName: foundation-critical
      terminationGracePeriodSeconds: 30
      
      # Anti-affinity for HA
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: temporal
                component: server
            topologyKey: kubernetes.io/hostname
      
      # Topology spread across nodes
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: temporal
            component: server
      
      containers:
      - name: temporal
        image: temporalio/server:1.25.0
        imagePullPolicy: IfNotPresent
        
        # Resource allocation: 750MB request / 1GB limit
        resources:
          requests:
            memory: "750Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # Port configuration
        ports:
        - name: frontend
          containerPort: 7233
          protocol: TCP
        - name: history
          containerPort: 7234
          protocol: TCP
        - name: matching
          containerPort: 7235
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        - name: int-frontend
          containerPort: 7236
          protocol: TCP
        - name: int-history
          containerPort: 7237
          protocol: TCP
        - name: int-matching
          containerPort: 7238
          protocol: TCP
        
        # Environment variables for Temporal configuration
        env:
        - name: SERVICES
          value: "frontend,history,matching"
        - name: SQL_PLUGIN
          value: "postgres12"
        - name: DB
          value: "postgresql"
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-postgres-creds
              key: username
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              name: temporal-postgres-creds
              key: password
        - name: POSTGRES_SEEDS
          valueFrom:
            secretKeyRef:
              name: temporal-postgres-creds
              key: host
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: "/etc/temporal/config/dynamicconfig.yaml"
        - name: SKIP_DEFAULT_NAMESPACE_CREATION
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        - name: NUM_HISTORY_SHARDS
          value: "512"
        
        # Volume mounts
        volumeMounts:
        - name: config
          mountPath: /etc/temporal/config
          readOnly: true
        - name: config-template
          mountPath: /etc/temporal/config/config_template.yaml
          subPath: config_template.yaml
          readOnly: true
        - name: data
          mountPath: /var/lib/temporal
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
        
        # Security context
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
  
      # Volumes
      volumes:
      - name: config
        configMap:
          name: temporal-config
      - name: config-template
        configMap:
          name: temporal-config-template
      - name: data
        emptyDir: {}
  
  # PVC template (optional for persistence)
  volumeClaimTemplates:
  - metadata:
      name: temporal-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: hcloud-volumes
      resources:
        requests:
          storage: 10Gi