apiVersion: v1
kind: Secret
metadata:
  name: temporal-tls-certs
  namespace: control-plane
  labels:
    app: temporal
    component: tls
type: Opaque
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    # SPIFFE certificate for temporal server
    # This should be replaced with actual SPIFFE certificate
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    # Private key for temporal server
    # This should be replaced with actual private key
    -----END PRIVATE KEY-----
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    # CA certificate for mTLS
    # This should be replaced with actual CA certificate
    -----END CERTIFICATE-----