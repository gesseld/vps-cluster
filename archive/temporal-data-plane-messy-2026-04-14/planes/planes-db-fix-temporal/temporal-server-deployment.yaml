apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  namespace: data-plane
  labels:
    app: temporal-server
    plane: data
    tenant: temporal-tenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
        plane: data
        tenant: temporal-tenant
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: temporal
        image: temporalio/server:1.30.4
        # Use command-line arguments instead of config file
        command: ["/bin/bash"]
        args: 
        - "-c"
        - |
          /temporal-server \
          --services frontend \
          --sql-host postgresql-primary \
          --sql-port 5432 \
          --sql-database temporal \
          --sql-user temporal \
          --sql-password temporal \
          --sql-plugin-name postgres12 \
          --visibility-sql-host postgresql-primary \
          --visibility-sql-port 5432 \
          --visibility-sql-database temporal_visibility \
          --visibility-sql-user temporal \
          --visibility-sql-password temporal \
          --visibility-sql-plugin-name postgres12
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        ports:
        - containerPort: 7233
          name: frontend
        - containerPort: 7234
          name: history
        - containerPort: 7235
          name: matching
        - containerPort: 7239
          name: worker
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-server
  namespace: data-plane
  labels:
    app: temporal-server
    plane: data
spec:
  ports:
  - port: 7233
    targetPort: 7233
    name: frontend
  selector:
    app: temporal-server