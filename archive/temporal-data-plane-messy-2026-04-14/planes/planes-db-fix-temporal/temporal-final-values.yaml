# Final Temporal deployment values
elasticsearch:
  enabled: false

grafana:
  enabled: false

postgresql:
  enabled: false

prometheus:
  enabled: false

server:
  config:
    persistence:
      default:
        sql:
          connectAddr: postgresql-primary:5432
          databaseName: temporal
          password: temporal
          user: temporal
      visibility:
        sql:
          connectAddr: postgresql-primary:5432
          databaseName: temporal_visibility
          password: temporal
          user: temporal
  replicaCount: 1

web:
  enabled: false

# Start with minimal services
admintools:
  enabled: false

history:
  enabled: false

matching:
  enabled: false

worker:
  enabled: false

# Only enable frontend for now
frontend:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

# Kyverno compliance
global:
  commonLabels:
    plane: data
    tenant: temporal-tenant

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container security context  
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

# Disable schema job (run manually if needed)
schema:
  enabled: false