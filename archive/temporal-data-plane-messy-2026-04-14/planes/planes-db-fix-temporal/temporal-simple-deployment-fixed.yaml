apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-simple
  namespace: data-plane
  labels:
    app: temporal-simple
    plane: data
    tenant: temporal-tenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-simple
  template:
    metadata:
      labels:
        app: temporal-simple
        plane: data
        tenant: temporal-tenant
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: temporal
        image: temporalio/auto-setup:1.29.1
        args: ["--services", "frontend", "--sql-host", "postgresql-primary", "--sql-port", "5432", "--sql-database", "temporal", "--sql-user", "temporal", "--sql-password", "temporal"]
        env:
        - name: TEMPORAL_SQL_PLUGIN_NAME
          value: "postgres12"
        - name: TEMPORAL_VISIBILITY_SQL_PLUGIN_NAME
          value: "postgres12"
        - name: TEMPORAL_VISIBILITY_SQL_HOST
          value: "postgresql-primary"
        - name: TEMPORAL_VISIBILITY_SQL_DATABASE
          value: "temporal_visibility"
        # Allow write access for configuration files
        securityContext:
          readOnlyRootFilesystem: false  # Changed from true to false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        ports:
        - containerPort: 7233
          name: frontend
        - containerPort: 7234
          name: history
        - containerPort: 7235
          name: matching
        - containerPort: 7239
          name: worker
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-simple
  namespace: data-plane
  labels:
    app: temporal-simple
    plane: data
spec:
  ports:
  - port: 7233
    targetPort: 7233
    name: frontend
  selector:
    app: temporal-simple