# Minimal Temporal deployment that fits within resource quota
elasticsearch:
  enabled: false

grafana:
  enabled: false

postgresql:
  enabled: false

prometheus:
  enabled: false

server:
  config:
    persistence:
      default:
        sql:
          connectAddr: postgresql-primary:5432
          databaseName: temporal
          password: temporal
          user: temporal
      visibility:
        sql:
          connectAddr: postgresql-primary:5432
          databaseName: temporal_visibility
          password: temporal
          user: temporal
  replicaCount: 1

web:
  enabled: false

# Minimal resource configuration to fit within quota
# Total memory needed: ~1.5Gi (leaves ~500Mi buffer)
# Total CPU needed: ~500m (leaves ~1900m buffer)

admintools:
  enabled: false  # Disable admin tools (not essential for operation)

frontend:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

history:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

matching:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

# Kyverno compliance
global:
  commonLabels:
    plane: data
    tenant: temporal-tenant

# Security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL