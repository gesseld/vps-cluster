# Final working Temporal solution
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-config-final
  namespace: data-plane
  labels:
    plane: data
    tenant: temporal-tenant
data:
  docker.yaml: |
    persistence:
      default:
        sql:
          pluginName: "postgres12"
          databaseName: "temporal"
          connectAddr: "postgresql-primary:5432"
          user: "temporal"
          password: "temporal"
      visibility:
        sql:
          pluginName: "postgres12"
          databaseName: "temporal_visibility"
          connectAddr: "postgresql-primary:5432"
          user: "temporal"
          password: "temporal"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-final
  namespace: data-plane
  labels:
    app: temporal-final
    plane: data
    tenant: temporal-tenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-final
  template:
    metadata:
      labels:
        app: temporal-final
        plane: data
        tenant: temporal-tenant
    spec:
      volumes:
      - name: config
        configMap:
          name: temporal-config-final
      - name: temporal-config-dir
        emptyDir: {}  # Writable volume for Temporal config
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-config
        image: busybox:latest
        command: ['sh', '-c', 'cp /config-source/docker.yaml /config-dest/docker.yaml']
        volumeMounts:
        - name: config
          mountPath: /config-source
          readOnly: true
        - name: temporal-config-dir
          mountPath: /config-dest
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      containers:
      - name: temporal
        image: temporalio/server:1.30.4
        # Use the default entrypoint (start-temporal.sh) which will use --env docker
        # Mount the config directory at the expected location
        volumeMounts:
        - name: temporal-config-dir
          mountPath: /etc/temporal/config
        env:
        - name: SERVICES
          value: "frontend"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        ports:
        - containerPort: 7233
          name: frontend
        livenessProbe:
          httpGet:
            path: /health
            port: 7233
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7233
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-final
  namespace: data-plane
  labels:
    app: temporal-final
    plane: data
spec:
  ports:
  - port: 7233
    targetPort: 7233
    name: frontend
  selector:
    app: temporal-final