# Fixed working Temporal solution
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-config
  namespace: data-plane
  labels:
    plane: data
    tenant: temporal-tenant
data:
  docker.yaml: |
    persistence:
      default:
        sql:
          pluginName: "postgres12"
          databaseName: "temporal"
          connectAddr: "postgresql-primary:5432"
          user: "temporal"
          password: "temporal"
      visibility:
        sql:
          pluginName: "postgres12"
          databaseName: "temporal_visibility"
          connectAddr: "postgresql-primary:5432"
          user: "temporal"
          password: "temporal"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-working
  namespace: data-plane
  labels:
    app: temporal-working
    plane: data
    tenant: temporal-tenant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-working
  template:
    metadata:
      labels:
        app: temporal-working
        plane: data
        tenant: temporal-tenant
    spec:
      volumes:
      - name: config
        configMap:
          name: temporal-config
      - name: temp
        emptyDir: {}  # Writable volume for temporary files
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: temporal
        image: temporalio/server:1.30.4
        command: ["/bin/bash"]
        args: 
        - "-c"
        - |
          # Copy config to writable volume
          cp /etc/temporal-config/docker.yaml /tmp-vol/docker.yaml
          # Start Temporal with config file
          temporal-server --env docker start --config /tmp-vol/docker.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/temporal-config
          readOnly: true
        - name: temp
          mountPath: /tmp-vol
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        ports:
        - containerPort: 7233
          name: frontend
        livenessProbe:
          httpGet:
            path: /health
            port: 7233
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7233
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-working
  namespace: data-plane
  labels:
    app: temporal-working
    plane: data
spec:
  ports:
  - port: 7233
    targetPort: 7233
    name: frontend
  selector:
    app: temporal-working