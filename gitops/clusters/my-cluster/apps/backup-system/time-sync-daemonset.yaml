apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ntp-checker
  namespace: backup-system
  labels:
    app: ntp-checker
    component: time-sync
    plane: data
spec:
  selector:
    matchLabels:
      app: ntp-checker
  template:
    metadata:
      labels:
        app: ntp-checker
        plane: data
    spec:
      priorityClassName: dip-batch
      hostNetwork: true
      containers:
      - name: ntp-check
        image: alpine:3.19
        command:
        - /bin/sh
        - -ce
        - |
          apk add --no-cache chrony >/dev/null 2>&1
          while true; do
            NODE=$(hostname)
            OFFSET=$(chronyc tracking 2>/dev/null | grep "System time" | awk '{print $4}' || echo "0")
            echo "node_ntp_offset_seconds{node=\"$NODE\"} $OFFSET" > /tmp/ntp-metrics.prom
            echo "NTP offset on $NODE: ${OFFSET}s"
            sleep 300
          done
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "50m"
            memory: "64Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - SYS_TIME
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ntp-checker-metrics
  namespace: backup-system
  labels:
    app: ntp-checker
    component: time-sync
spec:
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
  selector:
    app: ntp-checker
