apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-controller-lite
  namespace: backup-system
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-controller-lite
  namespace: backup-system
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data
rules:
- apiGroups: [""]
  resources: ["configmaps", "pods", "events"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-controller-lite-ns-mgr
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-controller-lite-ns-mgr
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data
subjects:
- kind: ServiceAccount
  name: backup-controller-lite
  namespace: backup-system
roleRef:
  kind: ClusterRole
  name: backup-controller-lite-ns-mgr
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-controller-lite-cng-reader
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data
rules:
- apiGroups: ["postgresql.cnpg.io"]
  resources: ["backups", "clusters"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch", ""]
  resources: ["jobs", "pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-controller-lite
  namespace: backup-system
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data
subjects:
- kind: ServiceAccount
  name: backup-controller-lite
  namespace: backup-system
roleRef:
  kind: Role
  name: backup-controller-lite
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-controller-lite-cng-reader
  labels:
    app: backup-controller-lite
    component: orchestration
    plane: data
subjects:
- kind: ServiceAccount
  name: backup-controller-lite
  namespace: backup-system
roleRef:
  kind: ClusterRole
  name: backup-controller-lite-cng-reader
  apiGroup: rbac.authorization.k8s.io
