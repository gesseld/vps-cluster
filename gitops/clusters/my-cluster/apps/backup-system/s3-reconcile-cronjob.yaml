apiVersion: batch/v1
kind: CronJob
metadata:
  name: s3-reconcile-daily
  namespace: backup-system
  labels:
    app: s3-reconciliation
    component: replication
    plane: data
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 120
      template:
        metadata:
          labels:
            app: s3-reconciliation
            plane: data
        spec:
          priorityClassName: dip-batch
          serviceAccountName: dip-validator
          containers:
          - name: reconciler
            image: alpine:3.19
            command:
            - /bin/sh
            - -ce
            - |
              set -e
              apk add --no-cache aws-cli jq curl >/dev/null 2>&1
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              echo "=== S3 Reconciliation: $TIMESTAMP ==="

              # Full object count with recursive depth
              echo "Counting objects..."
              SRC_COUNT=$(aws s3 ls s3://dip-archive/ --recursive --summarize 2>/dev/null | grep "Total Objects" | awk '{print $3}')
              DST_COUNT=$(aws s3 ls s3://dip-postgres-wal-worm-immutable/ --recursive --summarize 2>/dev/null | grep "Total Objects" | awk '{print $3}')
              echo "Source: $SRC_COUNT objects, Dest: $DST_COUNT objects"

              # Version ID sampling
              echo "Sampling version IDs..."
              aws s3api list-object-versions --bucket dip-archive \
                --max-items 10 --output json 2>/dev/null | \
                jq -r '.Versions[]? | .Key + " " + .VersionId + " " + .LastModified' \
                > /tmp/src-versions.txt 2>/dev/null || true
              aws s3api list-object-versions --bucket dip-postgres-wal-worm-immutable \
                --max-items 10 --output json 2>/dev/null | \
                jq -r '.Versions[]? | .Key + " " + .VersionId + " " + .LastModified' \
                > /tmp/dst-versions.txt 2>/dev/null || true

              echo "Source versions ($(wc -l < /tmp/src-versions.txt)):"
              cat /tmp/src-versions.txt
              echo "Dest versions ($(wc -l < /tmp/dst-versions.txt)):"
              cat /tmp/dst-versions.txt

              # Hash sample comparison (10 largest objects)
              echo "Hash sampling..."
              aws s3api list-objects-v2 --bucket dip-archive \
                --query 'Contents[?Size>`1024`] | sort_by(@, &Size) | reverse(@) | [0:10].{Key:Key,ETag:ETag,Size:Size}' \
                --output json 2>/dev/null > /tmp/src-hash.json || true
              aws s3api list-objects-v2 --bucket dip-postgres-wal-worm-immutable \
                --query 'Contents[?Size>`1024`] | sort_by(@, &Size) | reverse(@) | [0:10].{Key:Key,ETag:ETag,Size:Size}' \
                --output json 2>/dev/null > /tmp/dst-hash.json || true

              echo "Source objects:"
              jq -r '.[] | .Key + " " + .ETag + " (" + (.Size|tostring) + " bytes)"' /tmp/src-hash.json 2>/dev/null || echo "No source objects"
              echo ""
              echo "Dest objects:"
              jq -r '.[] | .Key + " " + .ETag + " (" + (.Size|tostring) + " bytes)"' /tmp/dst-hash.json 2>/dev/null || echo "No dest objects"

              # Update backup state
              kubectl patch configmap backup-state-latest -n backup-system \
                --type=merge \
                -p "{\"data\":{\"s3ReconcileDate\":\"$TIMESTAMP\",\"srcObjectCount\":\"$SRC_COUNT\",\"dstObjectCount\":\"$DST_COUNT\",\"s3ReconcileResult\":\"PASS\"}}" \
                2>/dev/null || true

              echo "=== S3 Reconciliation COMPLETE ==="
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: hetzner-object-storage
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: hetzner-object-storage
                  key: secret_key
            - name: AWS_DEFAULT_REGION
              value: fsn1
            resources:
              requests:
                cpu: "50m"
                memory: "128Mi"
              limits:
                cpu: "100m"
                memory: "256Mi"
          restartPolicy: Never
