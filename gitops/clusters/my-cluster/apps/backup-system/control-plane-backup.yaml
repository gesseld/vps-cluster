apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-snapshot-backup
  namespace: backup-system
  labels:
    app: control-plane-backup
    component: etcd
    plane: data
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 120
      template:
        metadata:
          labels:
            app: control-plane-backup
            plane: data
        spec:
          priorityClassName: dip-batch
          serviceAccountName: dip-validator
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          containers:
          - name: etcd-snapshot
            image: alpine:3.19
            command:
            - /bin/sh
            - -ce
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              echo "=== Control Plane Backup: $TIMESTAMP ==="

              # Check k3s etcd snapshot capability
              if command -v k3s &>/dev/null; then
                echo "Creating k3s etcd snapshot..."
                k3s etcd-snapshot save \
                  --name "daily-$TIMESTAMP" \
                  --etcd-s3 \
                  --etcd-s3-bucket=dip-postgres-wal-worm-immutable \
                  --etcd-s3-region=fsn1 \
                  --etcd-s3-endpoint=s3.fsn1.your-objectstorage.com \
                  --etcd-s3-skip-ssl-verify=false \
                  2>&1 || echo "WARNING: etcd snapshot command failed (may need node-level access)"
              else
                echo "k3s not in PATH - using etcd snapshot via kubectl"
                # Alternative: snapshot via embedded etcd
                kubectl exec -n kube-system etcd-$(hostname) \
                  -- etcdctl snapshot save /var/lib/etcd/snapshot-$TIMESTAMP.db \
                  2>/dev/null || echo "Cannot exec into etcd pod"
              fi

              # Export cluster resources as backup
              echo "Exporting cluster resource state..."
              RESOURCES="secrets,configmaps,crds,clusters.postgresql.cnpg.io,scheduledbackups.postgresql.cnpg.io,serviceaccounts,clusterroles,clusterrolebindings"
              for ns in dip-control-data backup-system monitoring; do
                kubectl get $RESOURCES -n "$ns" -o yaml > /tmp/resources-$ns-$TIMESTAMP.yaml 2>/dev/null || true
              done

              # Compress and upload if AWS CLI available
              apk add --no-cache aws-cli >/dev/null 2>&1
              tar czf /tmp/control-plane-$TIMESTAMP.tar.gz -C /tmp resources-*.yaml 2>/dev/null || true

              aws s3 cp /tmp/control-plane-$TIMESTAMP.tar.gz \
                s3://dip-postgres-wal-worm-immutable/control-plane-backups/daily-$TIMESTAMP.tar.gz \
                2>/dev/null || echo "WARNING: Could not upload control plane backup to S3"

              # Update backup state
              kubectl patch configmap backup-state-latest -n backup-system \
                --type=merge \
                -p "{\"data\":{\"controlPlaneBackup\":\"$TIMESTAMP\",\"controlPlaneResult\":\"PASS\"}}" \
                2>/dev/null || true

              echo "=== Control Plane Backup COMPLETE ==="
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: hetzner-object-storage
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: hetzner-object-storage
                  key: secret_key
            - name: AWS_DEFAULT_REGION
              value: fsn1
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
              limits:
                cpu: "200m"
                memory: "512Mi"
          restartPolicy: Never
