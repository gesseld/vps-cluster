---
# Server upgrade Plan 
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-server
  namespace: system-upgrade
  labels:
    k3s-upgrade: server
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values: ["true"]
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
    channel: https://update.k3s.io/v1-release/channels/stable
    # For production — pin to explicit version instead:
    # version: v1.29.2+k3s1

---
# Agent upgrade Plan (runs AFTER server plan completes)
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent
  namespace: system-upgrade
spec:
  concurrency: 2
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: NotIn
        values: ["true"]
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
    prepare:
      image: rancher/k3s-upgrade
      args: ["prepare", "k3s-server"]
    channel: https://update.k3s.io/v1-release/channels/stable